name: Android Preview APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android preview APK
        run: eas build --platform android --profile preview --non-interactive --wait --json > eas-build.json

      - name: Download APK from EAS
        shell: bash
        run: |
          APK_URL=$(jq -r 'if type=="array" then .[0].artifacts.applicationArchiveUrl else .artifacts.applicationArchiveUrl end' eas-build.json)
          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "Could not find APK URL in eas-build.json"
            cat eas-build.json
            exit 1
          fi

          mkdir -p dist
          curl -L "$APK_URL" -o "dist/fit-boss-preview-${GITHUB_RUN_NUMBER}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fit-boss-preview-apk
          path: dist/*.apk

      - name: Publish rolling GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-android
          name: Latest Android APK
          prerelease: true
          make_latest: false
          files: dist/*.apk
          body: |
            Latest preview Android APK built from `main`.

            Install note:
            Android users need to download and install the newer APK to update.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
